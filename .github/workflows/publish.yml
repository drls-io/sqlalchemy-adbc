name: Publish to PyPI

# Trusted publishing via OIDC — no API token needed.
# One-time setup on pypi.org: Account → Publishing → Add a pending publisher
#   Project name:  sqlalchemy-adbc
#   Owner:         drls-io
#   Repository:    sqlalchemy-adbc
#   Workflow:      publish.yml
#   Environment:   pypi
# After the first successful publish the pending publisher becomes live.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        type: choice
        default: testpypi
        options: [testpypi, pypi]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: pip install --upgrade pip build
      - name: Verify tag matches pyproject version (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Tag v$TAG does not match pyproject.toml version $VER"
            exit 1
          fi
      - name: Build
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/sqlalchemy-adbc
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sqlalchemy-adbc
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    # Creates a GitHub Release for every tag push, using the matching
    # CHANGELOG.md section as the release body. Runs AFTER the PyPI
    # publish succeeds so we don't advertise a version that failed
    # to upload. No binary assets attached — PyPI is the distribution
    # channel; duplicating wheels here invites drift.
    name: Create GitHub Release
    needs: publish-pypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # Grab the section under `## [X.Y.Z]` up to the next `## `
          # heading (or EOF). `awk` keeps this portable across bash
          # versions without depending on gh's CHANGELOG conventions.
          NOTES=$(awk -v ver="$TAG" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "::warning::No CHANGELOG entry found for version $TAG"
            NOTES="Release v$TAG. See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          # Append PyPI link so the Release page directs installers
          # back to the canonical distribution.
          NOTES="$NOTES

          ---

          📦 **Install:** \`pip install sqlalchemy-adbc==$TAG\` —
          [view on PyPI](https://pypi.org/project/sqlalchemy-adbc/$TAG/)"
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          gh release create "v$TAG" \
            --title "v$TAG" \
            --notes "${{ steps.notes.outputs.notes }}"
